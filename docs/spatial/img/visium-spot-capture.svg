<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="380" fill="#fbfcfd" stroke="#e2e8f0" stroke-width="2"/>

  <text x="30" y="38" font-size="20" font-weight="700" fill="#1b365d">10x Visium: A Grid of Barcoded Capture Spots</text>
  <text x="30" y="60" font-size="13" fill="#718096">A tissue section is placed directly on a slide printed with ~5,000 spots, each ~55 µm across.</text>

  <!-- Slide with spot grid -->
  <g transform="translate(50,90)">
    <rect x="0" y="0" width="320" height="240" rx="10" fill="#eef2f7" stroke="#cbd5e0"/>
    <text x="160" y="-8" font-size="13" font-weight="700" fill="#1b365d" text-anchor="middle">Capture area (slide)</text>

    <!-- tissue section outline over the spots -->
    <path d="M 60,40 C 100,15 180,15 220,35 C 260,55 270,100 250,140 C 235,170 200,200 150,205 C 100,210 60,180 50,140 C 42,105 45,65 60,40 Z"
          fill="#e9b8a0" opacity="0.55" stroke="#c05621" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="160" y="230" font-size="11" fill="#c05621" text-anchor="middle">tissue section outline</text>

    <!-- hex-packed spot grid -->
    <g fill="#a0c4e4" stroke="#3182ce" stroke-width="1">
      <!-- generated rows, offset alternating -->
      <circle cx="30" cy="30" r="9"/><circle cx="62" cy="30" r="9"/><circle cx="94" cy="30" r="9"/><circle cx="126" cy="30" r="9"/><circle cx="158" cy="30" r="9"/><circle cx="190" cy="30" r="9"/><circle cx="222" cy="30" r="9"/><circle cx="254" cy="30" r="9"/><circle cx="286" cy="30" r="9"/>
      <circle cx="46" cy="58" r="9"/><circle cx="78" cy="58" r="9"/><circle cx="110" cy="58" r="9"/><circle cx="142" cy="58" r="9"/><circle cx="174" cy="58" r="9"/><circle cx="206" cy="58" r="9"/><circle cx="238" cy="58" r="9"/><circle cx="270" cy="58" r="9"/>
      <circle cx="30" cy="86" r="9"/><circle cx="62" cy="86" r="9"/><circle cx="94" cy="86" r="9"/><circle cx="126" cy="86" r="9"/><circle cx="158" cy="86" r="9"/><circle cx="190" cy="86" r="9"/><circle cx="222" cy="86" r="9"/><circle cx="254" cy="86" r="9"/><circle cx="286" cy="86" r="9"/>
      <circle cx="46" cy="114" r="9"/><circle cx="78" cy="114" r="9"/><circle cx="110" cy="114" r="9"/><circle cx="142" cy="114" r="9"/><circle cx="174" cy="114" r="9"/><circle cx="206" cy="114" r="9"/><circle cx="238" cy="114" r="9"/><circle cx="270" cy="114" r="9"/>
      <circle cx="30" cy="142" r="9"/><circle cx="62" cy="142" r="9"/><circle cx="94" cy="142" r="9"/><circle cx="126" cy="142" r="9"/><circle cx="158" cy="142" r="9"/><circle cx="190" cy="142" r="9"/><circle cx="222" cy="142" r="9"/><circle cx="254" cy="142" r="9"/><circle cx="286" cy="142" r="9"/>
      <circle cx="46" cy="170" r="9"/><circle cx="78" cy="170" r="9"/><circle cx="110" cy="170" r="9"/><circle cx="142" cy="170" r="9"/><circle cx="174" cy="170" r="9"/><circle cx="206" cy="170" r="9"/><circle cx="238" cy="170" r="9"/><circle cx="270" cy="170" r="9"/>
      <circle cx="30" cy="198" r="9"/><circle cx="62" cy="198" r="9"/><circle cx="94" cy="198" r="9"/><circle cx="126" cy="198" r="9"/><circle cx="158" cy="198" r="9"/><circle cx="190" cy="198" r="9"/><circle cx="222" cy="198" r="9"/><circle cx="254" cy="198" r="9"/><circle cx="286" cy="198" r="9"/>
    </g>

    <!-- highlight one spot under tissue -->
    <circle cx="142" cy="114" r="12" fill="none" stroke="#1b365d" stroke-width="2.5"/>
  </g>

  <!-- arrow to zoomed spot -->
  <g stroke="#a0aec0" stroke-width="2" fill="none" marker-end="url(#arrowV)">
    <line x1="400" y1="200" x2="450" y2="200"/>
  </g>
  <defs>
    <marker id="arrowV" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a0aec0"/>
    </marker>
  </defs>

  <!-- Zoomed single spot -->
  <g transform="translate(470,90)">
    <rect x="0" y="0" width="340" height="240" rx="8" fill="#1b365d"/>
    <text x="170" y="30" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">One capture spot, magnified</text>
    <text x="170" y="50" font-size="11" fill="#90cdf4" text-anchor="middle">millions of oligos printed on this one spot</text>

    <!-- oligo structure -->
    <g transform="translate(30,75)" font-size="12" fill="#ffffff">
      <rect x="0" y="0" width="60" height="26" fill="#4a5568" rx="3"/>
      <text x="30" y="17" text-anchor="middle" font-size="10">Read 1</text>
      <rect x="64" y="0" width="70" height="26" fill="#2b6cb0" rx="3"/>
      <text x="99" y="17" text-anchor="middle" font-size="10">Spot Barcode</text>
      <rect x="138" y="0" width="60" height="26" fill="#2f855a" rx="3"/>
      <text x="168" y="17" text-anchor="middle" font-size="10">UMI</text>
      <rect x="202" y="0" width="80" height="26" fill="#c05621" rx="3"/>
      <text x="242" y="17" text-anchor="middle" font-size="10">Poly(dT)</text>
    </g>

    <text x="30" y="130" font-size="11" fill="#e2e8f0">Every oligo on this spot shares the same</text>
    <text x="30" y="148" font-size="11" fill="#e2e8f0">Spot Barcode — so every transcript captured</text>
    <text x="30" y="166" font-size="11" fill="#e2e8f0">here, from every cell overlapping the spot,</text>
    <text x="30" y="184" font-size="11" fill="#e2e8f0">is tagged with this one spatial address.</text>
    <text x="30" y="212" font-size="11" fill="#90cdf4" font-weight="700">Fiducial markers around the slide let</text>
    <text x="30" y="228" font-size="11" fill="#90cdf4" font-weight="700">Space Ranger align spots to the H&amp;E image.</text>
  </g>

  <text x="30" y="360" font-size="12" fill="#4a5568">Unlike droplet-based single-cell (one barcode per cell), a Visium spot's barcode marks a location, not a cell.</text>
</svg>
