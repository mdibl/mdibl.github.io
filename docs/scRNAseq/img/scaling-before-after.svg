<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="320" fill="#fbfcfd" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Panel 1: Before scaling -->
  <g transform="translate(75,50)">
    <text x="0" y="-16" font-size="18" font-weight="700" fill="#1b365d">Before ScaleData()</text>
    <text x="0" y="4" font-size="12" fill="#718096">expression level (raw / normalized counts)</text>
    <line x1="0" y1="220" x2="330" y2="220" stroke="#a0aec0" stroke-width="1.5"/>
    <text x="0" y="240" font-size="11" fill="#a0aec0">0</text>
    <text x="300" y="240" font-size="11" fill="#a0aec0">high</text>

    <!-- Gene A: high mean, spread out -->
    <text x="-8" y="35" font-size="12" fill="#2c5282" text-anchor="end">Gene A</text>
    <line x1="180" y1="35" x2="180" y2="35" stroke="none"/>
    <g fill="#2c5282" opacity="0.75">
      <circle cx="150" cy="30" r="5"/><circle cx="175" cy="35" r="5"/><circle cx="200" cy="28" r="5"/>
      <circle cx="220" cy="38" r="5"/><circle cx="160" cy="40" r="5"/><circle cx="240" cy="32" r="5"/>
      <circle cx="190" cy="45" r="5"/><circle cx="210" cy="42" r="5"/>
    </g>
    <line x1="195" y1="15" x2="195" y2="55" stroke="#2c5282" stroke-width="2" stroke-dasharray="3,2"/>

    <!-- Gene B: low mean, tight spread -->
    <text x="-8" y="95" font-size="12" fill="#2f855a" text-anchor="end">Gene B</text>
    <g fill="#2f855a" opacity="0.75">
      <circle cx="30" cy="90" r="5"/><circle cx="40" cy="98" r="5"/><circle cx="25" cy="102" r="5"/>
      <circle cx="45" cy="92" r="5"/><circle cx="35" cy="105" r="5"/><circle cx="20" cy="95" r="5"/>
      <circle cx="50" cy="100" r="5"/><circle cx="38" cy="88" r="5"/>
    </g>
    <line x1="35" y1="75" x2="35" y2="115" stroke="#2f855a" stroke-width="2" stroke-dasharray="3,2"/>

    <!-- Gene C: medium mean, wide spread -->
    <text x="-8" y="155" font-size="12" fill="#c05621" text-anchor="end">Gene C</text>
    <g fill="#c05621" opacity="0.75">
      <circle cx="90" cy="150" r="5"/><circle cx="130" cy="160" r="5"/><circle cx="70" cy="165" r="5"/>
      <circle cx="150" cy="145" r="5"/><circle cx="110" cy="170" r="5"/><circle cx="60" cy="155" r="5"/>
      <circle cx="160" cy="158" r="5"/><circle cx="100" cy="140" r="5"/>
    </g>
    <line x1="108" y1="130" x2="108" y2="180" stroke="#c05621" stroke-width="2" stroke-dasharray="3,2"/>

    <text x="0" y="270" font-size="12" fill="#4a5568">Genes sit at very different means &amp; scales —</text>
    <text x="0" y="288" font-size="12" fill="#4a5568">highly expressed genes would dominate PCA.</text>
  </g>

  <!-- Arrow -->
  <g stroke="#a0aec0" stroke-width="2" fill="none" marker-end="url(#arrow2)">
    <line x1="420" y1="160" x2="470" y2="160"/>
  </g>
  <text x="445" y="145" font-size="11" fill="#718096" text-anchor="middle">z-score</text>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a0aec0"/>
    </marker>
  </defs>

  <!-- Panel 2: After scaling -->
  <g transform="translate(510,50)">
    <text x="0" y="-16" font-size="18" font-weight="700" fill="#1b365d">After ScaleData()</text>
    <text x="0" y="4" font-size="12" fill="#718096">z-score: mean = 0, variance = 1</text>
    <line x1="150" y1="15" x2="150" y2="220" stroke="#cbd5e0" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="0" y1="220" x2="300" y2="220" stroke="#a0aec0" stroke-width="1.5"/>
    <text x="145" y="240" font-size="11" fill="#a0aec0">0</text>

    <!-- All three genes now centered around x=150 with unit spread -->
    <text x="-8" y="60" font-size="12" fill="#2c5282" text-anchor="end">Gene A</text>
    <g fill="#2c5282" opacity="0.75">
      <circle cx="120" cy="55" r="5"/><circle cx="145" cy="60" r="5"/><circle cx="170" cy="53" r="5"/>
      <circle cx="185" cy="63" r="5"/><circle cx="130" cy="65" r="5"/><circle cx="195" cy="57" r="5"/>
      <circle cx="155" cy="70" r="5"/><circle cx="175" cy="67" r="5"/>
    </g>

    <text x="-8" y="125" font-size="12" fill="#2f855a" text-anchor="end">Gene B</text>
    <g fill="#2f855a" opacity="0.75">
      <circle cx="122" cy="120" r="5"/><circle cx="135" cy="128" r="5"/><circle cx="118" cy="132" r="5"/>
      <circle cx="160" cy="122" r="5"/><circle cx="128" cy="135" r="5"/><circle cx="110" cy="125" r="5"/>
      <circle cx="168" cy="130" r="5"/><circle cx="140" cy="118" r="5"/>
    </g>

    <text x="-8" y="190" font-size="12" fill="#c05621" text-anchor="end">Gene C</text>
    <g fill="#c05621" opacity="0.75">
      <circle cx="115" cy="185" r="5"/><circle cx="165" cy="195" r="5"/><circle cx="95" cy="200" r="5"/>
      <circle cx="180" cy="180" r="5"/><circle cx="140" cy="205" r="5"/><circle cx="85" cy="190" r="5"/>
      <circle cx="190" cy="193" r="5"/><circle cx="130" cy="175" r="5"/>
    </g>

    <text x="0" y="270" font-size="12" fill="#4a5568">Every gene now contributes equally —</text>
    <text x="0" y="288" font-size="12" fill="#4a5568">no gene dominates just by expression level.</text>
  </g>
</svg>
