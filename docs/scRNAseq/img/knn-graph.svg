<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="380" fill="#fbfcfd" stroke="#e2e8f0" stroke-width="2"/>

  <text x="30" y="38" font-size="20" font-weight="700" fill="#1b365d">FindNeighbors(): Build a K-Nearest-Neighbor Graph</text>
  <text x="30" y="60" font-size="13" fill="#718096">Cells become nodes in PCA space; each connects to its k nearest neighbors by distance.</text>

  <g transform="translate(60,90)">
    <!-- scattered points -->
    <g fill="#a0aec0">
      <circle cx="60" cy="40" r="6"/><circle cx="150" cy="30" r="6"/><circle cx="250" cy="60" r="6"/>
      <circle cx="330" cy="35" r="6"/><circle cx="420" cy="55" r="6"/><circle cx="70" cy="130" r="6"/>
      <circle cx="500" cy="30" r="6"/><circle cx="560" cy="70" r="6"/><circle cx="620" cy="40" r="6"/>
      <circle cx="40" cy="220" r="6"/><circle cx="120" cy="240" r="6"/><circle cx="200" cy="220" r="6"/>
      <circle cx="480" cy="210" r="6"/><circle cx="560" cy="230" r="6"/><circle cx="630" cy="200" r="6"/>
      <circle cx="700" cy="230" r="6"/><circle cx="300" cy="200" r="6"/><circle cx="380" cy="230" r="6"/>
      <circle cx="150" cy="160" r="6"/><circle cx="600" cy="150" r="6"/>
    </g>

    <!-- focal cell + neighborhood -->
    <circle cx="240" cy="130" r="42" fill="#bee3f8" opacity="0.5" stroke="#3182ce" stroke-width="1.5" stroke-dasharray="5,3"/>
    <g stroke="#3182ce" stroke-width="2">
      <line x1="240" y1="130" x2="205" y2="105"/>
      <line x1="240" y1="130" x2="270" y2="100"/>
      <line x1="240" y1="130" x2="275" y2="145"/>
      <line x1="240" y1="130" x2="215" y2="160"/>
      <line x1="240" y1="130" x2="200" y2="150"/>
    </g>
    <g fill="#3182ce">
      <circle cx="205" cy="105" r="7"/><circle cx="270" cy="100" r="7"/><circle cx="275" cy="145" r="7"/>
      <circle cx="215" cy="160" r="7"/><circle cx="200" cy="150" r="7"/>
    </g>
    <circle cx="240" cy="130" r="9" fill="#1b365d" stroke="#ffffff" stroke-width="2"/>
    <text x="240" y="105" font-size="12" font-weight="700" fill="#1b365d" text-anchor="middle" transform="translate(0,-25)"></text>
    <text x="240" y="70" font-size="12" fill="#1b365d" text-anchor="middle">focal cell</text>
    <text x="240" y="86" font-size="11" fill="#3182ce" text-anchor="middle">k = 5 nearest neighbors</text>
  </g>

  <text x="30" y="345" font-size="12" fill="#4a5568">Edges are then reweighted by Jaccard similarity — how much two cells' neighborhoods overlap — before</text>
  <text x="30" y="363" font-size="12" fill="#4a5568">Louvain clustering partitions the graph into communities.</text>
</svg>
