<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="380" fill="#fbfcfd" stroke="#e2e8f0" stroke-width="2"/>

  <text x="30" y="38" font-size="20" font-weight="700" fill="#1b365d">FindClusters(): Louvain Community Detection</text>
  <text x="30" y="60" font-size="13" fill="#718096">Dense connections within a community, sparse connections between communities.</text>

  <g transform="translate(60,90)" stroke-width="1.5">
    <!-- cross-community sparse edges (drawn first, light) -->
    <g stroke="#e2e8f0">
      <line x1="150" y1="90" x2="330" y2="70"/>
      <line x1="180" y1="180" x2="330" y2="190"/>
      <line x1="420" y1="80" x2="560" y2="60"/>
      <line x1="420" y1="200" x2="560" y2="210"/>
      <line x1="330" y1="120" x2="560" y2="130"/>
    </g>

    <!-- Cluster 1 (orange) -->
    <g stroke="#dd6b20" opacity="0.6">
      <line x1="60" y1="50" x2="100" y2="80"/><line x1="60" y1="50" x2="120" y2="40"/>
      <line x1="100" y1="80" x2="150" y2="90"/><line x1="120" y1="40" x2="150" y2="90"/>
      <line x1="100" y1="80" x2="70" y2="110"/><line x1="70" y1="110" x2="120" y2="130"/>
      <line x1="150" y1="90" x2="120" y2="130"/><line x1="60" y1="50" x2="70" y2="110"/>
    </g>
    <g fill="#dd6b20">
      <circle cx="60" cy="50" r="8"/><circle cx="120" cy="40" r="8"/><circle cx="100" cy="80" r="8"/>
      <circle cx="150" cy="90" r="8"/><circle cx="70" cy="110" r="8"/><circle cx="120" cy="130" r="8"/>
    </g>
    <text x="95" y="20" font-size="13" font-weight="700" fill="#dd6b20" text-anchor="middle">Cluster 0</text>

    <!-- Cluster 2 (blue) bottom-left -->
    <g stroke="#3182ce" opacity="0.6">
      <line x1="60" y1="200" x2="100" y2="170"/><line x1="100" y1="170" x2="150" y2="180"/>
      <line x1="60" y1="200" x2="90" y2="230"/><line x1="90" y1="230" x2="150" y2="180"/>
      <line x1="90" y1="230" x2="140" y2="240"/><line x1="150" y1="180" x2="140" y2="240"/>
      <line x1="100" y1="170" x2="180" y2="180"/>
    </g>
    <g fill="#3182ce">
      <circle cx="60" cy="200" r="8"/><circle cx="100" cy="170" r="8"/><circle cx="150" cy="180" r="8"/>
      <circle cx="90" cy="230" r="8"/><circle cx="140" cy="240" r="8"/><circle cx="180" cy="180" r="8"/>
    </g>
    <text x="105" y="150" font-size="13" font-weight="700" fill="#3182ce" text-anchor="middle">Cluster 1</text>

    <!-- Cluster 3 (green) center -->
    <g stroke="#2f855a" opacity="0.6">
      <line x1="330" y1="70" x2="380" y2="90"/><line x1="380" y1="90" x2="420" y2="80"/>
      <line x1="330" y1="70" x2="330" y2="120"/><line x1="330" y1="120" x2="380" y2="90"/>
      <line x1="330" y1="120" x2="330" y2="190"/><line x1="330" y1="190" x2="380" y2="170"/>
      <line x1="380" y1="170" x2="420" y2="200"/><line x1="380" y1="90" x2="420" y2="80"/>
    </g>
    <g fill="#2f855a">
      <circle cx="330" cy="70" r="8"/><circle cx="380" cy="90" r="8"/><circle cx="420" cy="80" r="8"/>
      <circle cx="330" cy="120" r="8"/><circle cx="330" cy="190" r="8"/><circle cx="380" cy="170" r="8"/>
      <circle cx="420" cy="200" r="8"/>
    </g>
    <text x="375" y="230" font-size="13" font-weight="700" fill="#2f855a" text-anchor="middle">Cluster 2</text>

    <!-- Cluster 4 (purple) right -->
    <g stroke="#805ad5" opacity="0.6">
      <line x1="560" y1="60" x2="610" y2="80"/><line x1="610" y1="80" x2="650" y2="60"/>
      <line x1="560" y1="60" x2="560" y2="130"/><line x1="560" y1="130" x2="610" y2="80"/>
      <line x1="560" y1="130" x2="560" y2="210"/><line x1="560" y1="210" x2="610" y2="230"/>
      <line x1="610" y1="230" x2="650" y2="200"/>
    </g>
    <g fill="#805ad5">
      <circle cx="560" cy="60" r="8"/><circle cx="610" cy="80" r="8"/><circle cx="650" cy="60" r="8"/>
      <circle cx="560" cy="130" r="8"/><circle cx="560" cy="210" r="8"/><circle cx="610" cy="230" r="8"/>
      <circle cx="650" cy="200" r="8"/>
    </g>
    <text x="605" y="20" font-size="13" font-weight="700" fill="#805ad5" text-anchor="middle">Cluster 3</text>
  </g>

  <text x="30" y="345" font-size="12" fill="#4a5568">Higher <tspan font-family="Menlo, monospace">resolution</tspan> → more, smaller communities. Lower <tspan font-family="Menlo, monospace">resolution</tspan> → fewer, larger ones.</text>
</svg>
