<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="860" height="340" fill="#fbfcfd" stroke="#e2e8f0" stroke-width="2"/>

  <text x="30" y="38" font-size="20" font-weight="700" fill="#1b365d">A Spot Is Not a Cell</text>
  <text x="30" y="60" font-size="13" fill="#718096">The same barcode-and-count idea from single-cell, but the barcode now marks a location, not a cell.</text>

  <!-- Panel 1: single-cell droplet -->
  <g transform="translate(50,90)">
    <rect x="0" y="0" width="330" height="210" rx="8" fill="#eef2f7" stroke="#cbd5e0"/>
    <text x="165" y="28" font-size="14" font-weight="700" fill="#1b365d" text-anchor="middle">Single-cell (droplet)</text>

    <circle cx="165" cy="120" r="60" fill="#bee3f8" stroke="#3182ce" stroke-width="1.5"/>
    <circle cx="165" cy="120" r="26" fill="#2c5282"/>
    <text x="165" cy="120" y="125" font-size="11" fill="#ffffff" text-anchor="middle">1 cell</text>

    <text x="165" y="195" font-size="12" fill="#4a5568" text-anchor="middle">1 barcode = 1 cell's transcripts</text>
  </g>

  <!-- Panel 2: visium spot -->
  <g transform="translate(460,90)">
    <rect x="0" y="0" width="350" height="210" rx="8" fill="#eef2f7" stroke="#cbd5e0"/>
    <text x="175" y="28" font-size="14" font-weight="700" fill="#1b365d" text-anchor="middle">Visium spot</text>

    <circle cx="175" cy="120" r="60" fill="#feebc8" stroke="#c05621" stroke-width="1.5"/>
    <!-- several cells overlapping the spot -->
    <g fill="#7b341e" opacity="0.85">
      <circle cx="150" cy="95" r="15"/>
      <circle cx="195" cy="100" r="14"/>
      <circle cx="160" cy="135" r="13"/>
      <circle cx="200" cy="140" r="15"/>
      <circle cx="178" cy="115" r="12"/>
    </g>
    <text x="175" y="195" font-size="12" fill="#4a5568" text-anchor="middle">1 barcode = pooled transcripts</text>
    <text x="175" y="212" font-size="12" fill="#4a5568" text-anchor="middle">from ~1–10 overlapping cells</text>
  </g>

  <text x="30" y="325" font-size="12" fill="#4a5568">This is why spatial data is described as a <tspan font-family="Menlo, monospace">spot × gene</tspan> matrix, not a <tspan font-family="Menlo, monospace">cell × gene</tspan> matrix: each</text>
  <text x="30" y="325" dy="18" font-size="12" fill="#4a5568">column is a mixture of whatever cells happen to sit under that spot, not a single cell's expression profile.</text>
</svg>
